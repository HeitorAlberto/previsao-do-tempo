name: Gerar Mapas de Chuva

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  gerar-mapas:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar dependências do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y libeccodes-dev libproj-dev libgeos-dev

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar bibliotecas Python
        run: |
          pip install --upgrade pip
          pip install ecmwf-opendata xarray cfgrib matplotlib cartopy geopandas geobr tqdm

      - name: Executar script de mapas
        run: python mapas.py

      - name: Commit e Push dos mapas
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          # Verifica se há arquivos alterados na pasta antes de commitar
          if [ -n "$(git status --porcelain mapas/)" ]; then
            git add mapas/
            git commit -m "Atualiza mapas de chuva [skip ci]"
            git push
          else
            echo "Nenhuma mudança nos mapas para commitar."
          fi
          
