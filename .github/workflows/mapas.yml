name: Mapas ECMWF

on:
  workflow_dispatch:

  schedule:
    # 07h Brasil (BRT = UTC-3)
    - cron: "0 10 * * *"

jobs:
  gerar-mapas:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libeccodes-dev \
            gdal-bin \
            libgdal-dev \
            libproj-dev \
            proj-data \
            proj-bin \
            libgeos-dev

      - name: Instalar dependências Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar script
        run: python mapas.py

      - name: Upload dos mapas
        uses: actions/upload-artifact@v4
        with:
          name: mapas
          path: mapas/