name: Gerar Mapas de Chuva

on:
  schedule:
    - cron: '0 8 * * *' # Roda todo dia às 08:00 UTC

workflow_dispatch:    # Permite rodar manualmente

jobs:
  gerar-mapas:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar dependências do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y libeccodes-dev libproj-dev libgeos-dev

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar bibliotecas Python
        run: |
          pip install --upgrade pip
          # Instala as dependências necessárias para o seu código
          pip install ecmwf-opendata xarray cfgrib matplotlib cartopy geopandas geobr tqdm

      - name: Executar script de mapas
        run: python mapas.py

      - name: Deploy dos mapas (exemplo: commit de volta para o repo)
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add mapas/
          git commit -m "Atualiza mapas de chuva [skip ci]" || echo "Nenhuma mudança nos mapas"
          git push
          
