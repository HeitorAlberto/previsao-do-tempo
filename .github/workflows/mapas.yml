name: Mapas ECMWF

on:
  schedule:
    # 10:00 UTC = 07:00 BRT
    - cron: "0 10 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  gerar-mapas:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ============================================================
      # DEPENDÊNCIAS DE SISTEMA (CRÍTICO PARA CARTOPY + ECCODES)
      # ============================================================
      - name: Instalar dependências do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libeccodes-dev \
            libgeos-dev \
            libproj-dev \
            proj-data \
            proj-bin \
            gdal-bin

      # ============================================================
      # DEPENDÊNCIAS PYTHON
      # ============================================================
      - name: Instalar dependências Python
        run: |
          pip install --upgrade pip
          pip install \
            ecmwf-opendata \
            cfgrib \
            cartopy \
            xarray \
            scipy \
            pillow \
            matplotlib \
            pandas \
            numpy

      # ============================================================
      # EXECUÇÃO
      # ============================================================
      - name: Rodar script de previsão
        run: python mapas.py

      # ============================================================
      # COMMIT DOS RESULTADOS
      # ============================================================
      - name: Commit mapas gerados
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add mapas/*.webp

          git commit -m "Atualização automática dos mapas" || echo "Sem mudanças"
          git push