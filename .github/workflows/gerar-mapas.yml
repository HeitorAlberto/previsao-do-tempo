name: Gerar Mapas ECMWF

on:
  workflow_dispatch:

  schedule:
    - cron: "0 10 * * *"   # 07:00 BRT

# Evita workflows simultâneos brigando no push
concurrency:
  group: ecmwf-mapas
  cancel-in-progress: true

jobs:
  run:

    runs-on: ubuntu-latest

    steps:

      # ======================================================
      # CHECKOUT
      # ======================================================

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ======================================================
      # DEPENDÊNCIAS DO SISTEMA
      # ======================================================

      - name: System deps (Cartopy)
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            libproj-dev \
            proj-data \
            proj-bin \
            libgeos-dev \
            gdal-bin

      # ======================================================
      # PYTHON
      # ======================================================

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ======================================================
      # DEPENDÊNCIAS PYTHON
      # ======================================================

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ======================================================
      # EXECUTA SCRIPT
      # ======================================================

      - name: Run script
        run: python gerar-mapas.py

      # ======================================================
      # COMMIT
      # ======================================================

      - name: Commit outputs
        run: |

          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add mapas

          git commit -m "update mapas" || echo "Sem mudanças"

          # Atualiza branch local antes do push
          git pull --rebase origin main

          git push origin main