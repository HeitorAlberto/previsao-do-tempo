name: Atualizar Mapas ECMWF

on:
  schedule:
    - cron: "0 9 * * *"

  workflow_dispatch:

jobs:
  gerar:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar dependências

        run: |

          sudo apt-get update

          sudo apt-get install -y \
            gdal-bin \
            libproj-dev \
            proj-data \
            proj-bin \
            libgeos-dev

          pip install --upgrade pip

          pip install \
            ecmwf-opendata \
            cartopy \
            xarray \
            matplotlib \
            pandas \
            numpy \
            scipy \
            Pillow \
            cfgrib[eccodes]

      - name: Gerar mapas ECMWF

        run: |

          python gerar_mapas.py

      - name: Gerar tiles WEBP

        run: |

          mkdir -p tiles

          for file in chuva_dia_*.png
          do

            nome=$(basename "$file" .png)

            echo "Convertendo $file -> GeoTIFF"

            gdal_translate \
              -of GTiff \
              -a_srs EPSG:4326 \
              -a_ullr -75 6 -30 -35 \
              "$file" \
              "${nome}.tif"

            echo "Convertendo TIFF -> WEBP"

            gdal_translate \
              -of WEBP \
              -co QUALITY=82 \
              "${nome}.tif" \
              "${nome}.webp"

            echo "Gerando tiles..."

            gdal2tiles.py \
              --zoom=0-5 \
              --processes=2 \
              --webviewer=none \
              --s_srs EPSG:4326 \
              "${nome}.tif" \
              "tiles/${nome}"

          done

      - name: Commit e Push

        run: |

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .

          git status

          git commit -m "Atualização automática ECMWF" || echo "Sem mudanças"

          git push origin main