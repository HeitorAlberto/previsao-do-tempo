name: Atualizar Mapas ECMWF

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  gerar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar dependências
        run: |
          sudo apt-get update
          sudo apt-get install -y libproj-dev proj-data proj-bin libgeos-dev
          pip install --upgrade pip
          pip install ecmwf-opendata cartopy xarray matplotlib pandas numpy scipy cfgrib[eccodes] Pillow

      - name: Gerar mapas ECMWF
        run: python gerar_mapas.py

      - name: Commit e Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add mapas/ || true
          git rm mapas/*.png --ignore-unmatch || true

          git commit -m "Atualização automática mapas (WebP Otimizado)" || exit 0
          git push origin main