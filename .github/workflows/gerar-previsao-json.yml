name: Gerar Previsão CSV

on:
  schedule:
    #03h da manhã BR
    - cron: '0 6 * * *'


  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libeccodes-dev
          pip install numpy xarray ecmwf-opendata cfgrib tqdm

      - name: Run forecast
        run: python previsao.py

      - name: Commit and push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add previsao_00Z.csv
          git diff --quiet && git diff --staged --quiet || \
          (git commit -m "Auto update forecast (00Z/12Z)" && git push)
