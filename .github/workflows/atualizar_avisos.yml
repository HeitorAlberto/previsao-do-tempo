name: Atualizar Avisos INMET
on:
  schedule:
    - cron: '15 */3 * * *' 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar Dependências
        run: pip install requests

      - name: Rodar Base IBGE (Referência)
        run: python avisos-inmet/gerar_base.py

      - name: Rodar Avisos INMET (Alertas)
        run: python avisos-inmet/processar_avisos.py

      - name: Commitar e dar Push
        run: |
          git config --global user.name 'Github Action'
          git config --global user.email 'action@github.com'
          git add avisos-inmet/referencia_locais.json
          git add avisos-inmet/alertas_ativos.json
          git commit -m "Automação: Atualizando base IBGE e alertas INMET" || exit 0
          
          # Rebase evita erros caso o workflow de Mapas tenha feito push no meio tempo
          git pull --rebase origin main
          git push origin main