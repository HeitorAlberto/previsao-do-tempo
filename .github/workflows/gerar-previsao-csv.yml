name: Gerar Previsão CSV

on:
  schedule:
    # Executa às 06:00 UTC (Rodada 00Z já disponível)
    - cron: '0 6 * * *'
    # Executa às 18:00 UTC (Rodada 12Z já disponível)
    - cron: '0 18 * * *'

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libeccodes-dev gcc g++

      - name: Install python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy xarray cfgrib eccodes ecmwf-opendata tqdm

      - name: Debug files
        run: ls -lah

      - name: Run forecast
        run: |
          # IMPORTANTE: Renomeie o seu script local para 'previsao.py' 
          # ou altere o nome abaixo para corresponder ao arquivo correto.
          python -u previsao.py

      - name: Commit and push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"

          git add previsao.csv
          git add metadata.txt

          git diff --cached --quiet || \
          (git commit -m "Auto update forecast" && git push)