name: Gerar Previsão CSV

on:
  schedule:
    - cron: '0 6 * * *'

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libeccodes-dev gcc g++

      - name: Install python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy xarray cfgrib eccodes ecmwf-opendata tqdm

      - name: Debug files
        run: ls -lah

      - name: Run forecast
        run: |
          python -u previsao.py

      - name: Commit and push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"

          git add previsao_00Z.csv

          git diff --cached --quiet || \
          (git commit -m "Auto update forecast (00Z)" && git push)