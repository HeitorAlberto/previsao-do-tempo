<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Previsão do Tempo</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');

    body {
      font-family: "Roboto", sans-serif;
      background: #ebebf3;
      margin: 0;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 900px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .search {
      display: flex;
      justify-content: center;
      margin-bottom: 10px;
      gap: 10px;
    }
    .search input {
      padding: 5px 10px;
      font-size: 1em;
      width: 250px;
    }
    .search button {
      padding: 6px 12px;
      font-size: 1em;
      cursor: pointer;
    }

    #location {
      text-align: center;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .forecast {
      display: grid;
      grid-template-columns: 1fr;
      width: 99%;
      gap: 20px;
    }

    .day {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      text-align: left;
      padding: 20px;
      gap: 30px;
    }

    .day h2 {
      font-size: 1.2em;
      color: #333;
      margin: 0 0 20px 0;
    }

    .info-row {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 20px;
    }

    .info {
      white-space: nowrap;
    }

    .alerts {
      color: #787878;
    }

    /* --- Responsividade: tablets e celulares --- */
    @media (max-width: 1024px) {
      
      .container {
        width: 98%;
      }

      .forecast {
        display: grid;
        grid-template-columns: 1fr;
        width: 98%;
        gap: 20px;
      }

      .info-row {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
      }
    }


  </style>
</head>
<body>
  <div class="container">
    <h1>Previsão do Tempo - 14 dias</h1>

    <div class="search">
      <input type="text" id="cityInput" placeholder="Digite o nome da cidade" />
      <button id="searchBtn">Buscar</button>
    </div>

    <div id="location"></div>
    <div id="forecast" class="forecast"></div>
  </div>

  <script>
    async function getCoordinates(city) {
      const geoUrl = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=pt`;
      const response = await fetch(geoUrl);
      const data = await response.json();
      if (data.results && data.results.length > 0) return data.results[0];
      return null;
    }

    function formatDateManual(dateStr) {
      const dias = ["Domingo", "Segunda", "Terça", "Quarta", "Quinta", "Sexta", "Sábado"];
      const [year, month, day] = dateStr.split("-");
      const dt = new Date(`${year}-${month}-${day}T12:00:00`);
      const weekday = dias[dt.getDay()];
      return `${weekday}, ${day}/${month}`;
    }

    function fmt(v, decimals = 0) {
      if (v === null || v === undefined || Number.isNaN(Number(v))) return "—";
      return Number(v).toFixed(decimals);
    }

    function generateAlerts(day) {
      const alerts = [];
      if (day.cloud_cover_mean >= 80) alerts.push("Nublado");
      else if (day.cloud_cover_mean >= 50) alerts.push("Muitas nuvens");
      else alerts.push("Poucas nuvens");

      if (typeof day.cape_max === "number" && day.cape_max > 1000) alerts.push("Alerta de trovoadas");

      if (day.precipitation_sum > 10) alerts.push("Chuvas");
      else if (day.precipitation_sum > 0) alerts.push("Chuva isolada");

      return alerts.join(" • ");
    }

    async function loadForecast(lat, lon) {
      try {
        const url = `https://ensemble-api.open-meteo.com/v1/ensemble?latitude=${lat}&longitude=${lon}&daily=temperature_2m_min,temperature_2m_max,apparent_temperature_mean,temperature_2m_mean,apparent_temperature_min,apparent_temperature_max,wind_speed_10m_mean,wind_speed_10m_min,wind_speed_10m_max,wind_direction_10m_dominant,cloud_cover_max,cloud_cover_min,cloud_cover_mean,wind_direction_100m_dominant,wind_speed_100m_max,wind_speed_100m_min,wind_speed_100m_mean,wind_gusts_10m_max,wind_gusts_10m_min,wind_gusts_10m_mean,precipitation_sum,precipitation_hours,rain_sum,snowfall_sum,pressure_msl_mean,pressure_msl_min,pressure_msl_max,surface_pressure_mean,surface_pressure_min,surface_pressure_max,shortwave_radiation_sum,et0_fao_evapotranspiration,dew_point_2m_max,dew_point_2m_min,dew_point_2m_mean,cape_max,cape_min,cape_mean,relative_humidity_2m_max,relative_humidity_2m_min,relative_humidity_2m_mean&hourly=cape&models=ecmwf_aifs025&timezone=auto&forecast_days=14`;
        const response = await fetch(url);
        const data = await response.json();

        const daily = data.daily;
        const forecastDiv = document.getElementById("forecast");
        forecastDiv.innerHTML = "";

        daily.time.forEach((date, i) => {
          const min = daily.temperature_2m_min[i];
          const max = daily.temperature_2m_max[i];
          const rain = daily.precipitation_sum[i];
          const wind = daily.wind_speed_10m_max[i];
          const windGusts = daily.wind_gusts_10m_max[i];
          const minHum = daily.relative_humidity_2m_min ? daily.relative_humidity_2m_min[i] : null;
          const maxHum = daily.relative_humidity_2m_max ? daily.relative_humidity_2m_max[i] : null;
          const cloud = daily.cloud_cover_mean[i];
          const cape = daily.cape_max[i];

          const dayData = { cloud_cover_mean: cloud, precipitation_sum: rain, cape_max: cape };

          const dayDiv = document.createElement("div");
          dayDiv.className = "day";

          dayDiv.innerHTML = `
            <h2>${formatDateManual(date)}</h2>
            <div class="info-row">
              <div class="info">🌡️ Temperatura: ${fmt(min,0)}° a ${fmt(max,0)}°</div>
              <div class="info">☔ Chuva acumulada: ${fmt(rain,1)} mm</div>
              <div class="info">🍃 Vento: ${fmt(wind,0)} km/h</div>
              <div class="info">💧 Umidade: ${fmt(minHum,0)}% a ${fmt(maxHum,0)}%</div>
            </div>
            <div class="alerts"><b>${generateAlerts(dayData)}</b></div>
          `;

          forecastDiv.appendChild(dayDiv);
        });
      } catch (error) {
        console.error("Erro ao carregar previsão:", error);
      }
    }

    document.getElementById("searchBtn").addEventListener("click", async () => {
      const city = document.getElementById("cityInput").value.trim();
      if (!city) return;

      const result = await getCoordinates(city);
      const locationDiv = document.getElementById("location");
      if (result) {
        locationDiv.textContent = `${result.name}, ${result.admin1 || ""}, ${result.country}`;
        await loadForecast(result.latitude, result.longitude);
      } else {
        locationDiv.textContent = "Cidade não encontrada.";
        document.getElementById("forecast").innerHTML = "";
      }
    });

    document.getElementById("cityInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter") document.getElementById("searchBtn").click();
    });
  </script>
</body>
</html>
