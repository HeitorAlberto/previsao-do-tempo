<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Previsão do Tempo</title>
  <link rel="stylesheet" href="styles/style.css">
</head>
<body>

  <header>
    <div id="titulo-site">
      <h1> Previsão do Tempo </h1>
    </div>


    <div class="div-base-form">
      <input type="text" id="cidadeInput" placeholder="Digite o nome da cidade...">
      <button id="button">Buscar</button>
  </div>
  </header>



  <div id="base-resultado-cidade">
    <p id="resultado"></p>
  </div>

  <div id="open-meteo-creditos">
    Dados meteorológicos fornecidos por 
    <a href="https://open-meteo.com/" target="_blank" rel="noopener noreferrer" style="text-decoration: none; color: rgb(24, 206, 124); margin-bottom: 20px;" >Open-Meteo</a>
  </div>

  

  <div class="dashboard">


    

  <div id="base-column-now">
    <div class="model-group">
      <h3 class="model-title">Tempo agora</h3>
      <div class="model-column-now" id="opmmm-column-now"></div>
    </div>
  </div>






  <div id="base-column">
    <div class="model-group">
      <h3 class="model-title">Previsão diária (16 dias)</h3>
      <div class="model-column" id="opmmm-column"></div>
    </div>
  </div>

    
  </div>









  <script type="module" src="scripts/main.js"></script>

</body>
</html>
