<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Previsão do Tempo</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f9;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    .container {
      max-width: 900px;
      width: 100%;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .search {
      display: flex;
      justify-content: center;
      margin-bottom: 10px;
      gap: 10px;
    }
    .search input {
      padding: 5px 10px;
      font-size: 1em;
      width: 250px;
    }
    .search button {
      padding: 6px 12px;
      font-size: 1em;
      cursor: pointer;
    }

    #location {
      text-align: center;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .forecast {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    .day {
      display: flex;
      flex-direction: row;
      gap: 25px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      text-align: center;
      transition: transform 0.2s;
      padding: 20px;
      align-items: center; /* mantém alinhamento vertical no desktop */
    }

    .day h2 {
      font-size: 1.2em;
      color: #333;
    }

    /* CORREÇÃO: aplicar margin:0 apenas aos elementos dentro de .day */
    .day > h2,
    .day p {
      margin: 0;
    }

    /* --- Responsividade: tablets e celulares --- */
    @media (max-width: 768px) {
      body {
        padding: 10px;
      }

      /* container usa toda a largura disponível */
      .container {
        max-width: 100%;
      }

      /* empilha e centraliza conteúdo dentro do card */
      .day {
        flex-direction: column;
        gap: 10px;
        align-items: center;
        text-align: center;
        padding: 16px;
      }

      /* faz cada filho do card ocupar toda a largura do card e centraliza o texto */
      .day > * {
        width: 100%;
        box-sizing: border-box;
        text-align: center;
      }

      /* ajuste da área de busca para ficar compacto e centralizado */
      .search {
        flex-direction: column;
        gap: 8px;
        align-items: center;
        width: 100%;
      }
      .search input,
      .search button {
        width: 95%;
        max-width: 420px;
        box-sizing: border-box;
      }
    }

    /* opcional: pequenos ajustes para muito pequenas larguras */
    @media (max-width: 420px) {
      h1 { font-size: 1.2rem; }
      .day { padding: 12px; gap: 8px; }
      .search input, .search button { padding: 10px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Previsão do Tempo</h1>

    <div class="search">
      <input type="text" id="cityInput" placeholder="Digite o nome da cidade" />
      <button id="searchBtn">Buscar</button>
    </div>

    <div id="location"></div>

    <div id="forecast" class="forecast"></div>
  </div>

  <script>
    async function getCoordinates(city) {
      const geoUrl = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=pt`;
      const response = await fetch(geoUrl);
      const data = await response.json();
      if (data.results && data.results.length > 0) return data.results[0];
      return null;
    }

    function formatDateManual(dateStr) {
      const dias = ["dom.", "seg.", "ter.", "qua.", "qui.", "sex.", "sáb."];
      const [year, month, day] = dateStr.split("-");
      const dt = new Date(`${year}-${month}-${day}T12:00:00`);
      const weekday = dias[dt.getDay()];
      return `${weekday}, ${day}/${month}`;
    }

    function generateAlerts(day) {
      const alerts = [];
      if (day.cloud_cover_mean >= 80) alerts.push("Nublado");
      else if (day.cloud_cover_mean >= 50) alerts.push("Muitas nuvens");
      else alerts.push("Poucas nuvens");

      if (day.cape_max > 1000) alerts.push("Alerta de trovoadas");

      if (day.precipitation_sum > 10) alerts.push("Chuvas");
      else if (day.precipitation_sum > 0) alerts.push("Chuva isolada");

      return alerts.join(" / ");
    }

    async function loadForecast(lat, lon) {
      try {
        const url = `https://ensemble-api.open-meteo.com/v1/ensemble?latitude=${lat}&longitude=${lon}&daily=temperature_2m_min,temperature_2m_max,wind_speed_10m_max,precipitation_sum,cloud_cover_mean,cape_max&models=ecmwf_aifs025&timezone=America%2FSao_Paulo&forecast_days=16`;
        const response = await fetch(url);
        const data = await response.json();

        const daily = data.daily;
        const forecastDiv = document.getElementById("forecast");
        forecastDiv.innerHTML = "";

        daily.time.forEach((date, i) => {
          const min = daily.temperature_2m_min[i];
          const max = daily.temperature_2m_max[i];
          const rain = daily.precipitation_sum[i];
          const wind = daily.wind_speed_10m_max[i];
          const cloud = daily.cloud_cover_mean[i];
          const cape = daily.cape_max[i];

          const dayData = { cloud_cover_mean: cloud, precipitation_sum: rain, cape_max: cape };

          const dayDiv = document.createElement("div");
          dayDiv.className = "day";

          dayDiv.innerHTML = `
            <h2>${formatDateManual(date)}</h2>
            <p>🌡️ ${min.toFixed(0)}° a ${max.toFixed(0)}°</p>
            <p>🌧️ ${rain.toFixed(1)} mm</p>
            <p>💨 ${wind.toFixed(0)} km/h</p>
            <p style="color:#171391">${generateAlerts(dayData)}</p>
          `;

          forecastDiv.appendChild(dayDiv);
        });
      } catch (error) {
        console.error("Erro ao carregar previsão:", error);
      }
    }

    document.getElementById("searchBtn").addEventListener("click", async () => {
      const city = document.getElementById("cityInput").value.trim();
      if (!city) return;

      const result = await getCoordinates(city);
      const locationDiv = document.getElementById("location");
      if (result) {
        locationDiv.textContent = `${result.name}, ${result.admin1 || ""}, ${result.country}`;
        await loadForecast(result.latitude, result.longitude);
      } else {
        locationDiv.textContent = "Cidade não encontrada.";
        document.getElementById("forecast").innerHTML = "";
      }
    });

    // opcional: permite buscar ao apertar Enter
    document.getElementById("cityInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter") document.getElementById("searchBtn").click();
    });
  </script>
</body>
</html>
