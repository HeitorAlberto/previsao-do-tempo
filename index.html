<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Previsão do tempo - ECMWF</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="icone.ico" type="image/x-icon">
</head>

<body>
    <header>
        <div id="titulo-site">PREVISÃO DO TEMPO</div>
        <form id="searchForm">
            <input type="text" id="cityInput" placeholder="Buscar cidade (ex: Recife, Brasil)" autocomplete="on" />
            <button type="submit">Buscar</button>
            <button type="button" id="geoButton">Localizar</button>
        </form>
    </header>

    <div id="historyContainer"></div>

    <main>
        <div class="location-row">
            <div style="display: grid; gap: 20px;margin-bottom: 40px; justify-items: center;padding: 12px;">
                <div id="locationName"></div>
                <div><span id="todayDate"></span></div>
                <div>Modelo ECMWF (HRES 9 km)</div>
                <div><a href="https://open-meteo.com/en/docs/ecmwf-api" target="_blank" class="open-meteo-ref">Dados via Open Meteo</a></div>
            </div>
        </div>

        <section id="forecastSection">
            <div id="cards"></div>
        </section>
    </main>

    <script type="module" src="scripts.js"></script>
</body>

</html>
