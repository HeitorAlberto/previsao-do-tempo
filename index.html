<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Previsão do tempo - 16 dias</title>
<style>
  body { 
    font-family: Arial, sans-serif; 
    background: #f0f0f0; 
    padding: 20px; 
    margin: 0;
  }

  h1 { 
    text-align: center; 
    margin-bottom: 20px; 
  }

  /* Barra de busca */
  .search-bar {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 30px;
    flex-wrap: wrap;
  }

  .search-bar input[type="text"] {
    padding: 10px 15px;
    font-size: 16px;
    border-radius: 8px;
    border: 1px solid #ccc;
    min-width: 200px;
    max-width: 100%;
    box-sizing: border-box;
  }

  .search-bar button {
    padding: 10px 15px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    background-color: #000000;
    color: white;
    font-weight: bold;
    flex-shrink: 0;
  }

  .search-bar button:hover {
    background-color: #434343;
  }

  /* Dashboard: 1 card por linha, centralizado */
  .dashboard { 
    display: flex; 
    flex-direction: column;
    align-items: center;
    gap: 20px;
    width: 100%;
    max-width: 500px;
    margin: 0 auto;
    box-sizing: border-box;
  }

  /* Cards */
  .card { 
    background: #ffffff; 
    border-radius: 12px; 
    padding: 20px; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    border: 2px solid black;
    width: 100%;
    box-sizing: border-box;
  }

  /* Data do card */
  .card-date { 
    font-weight: bold; 
    margin-bottom: 15px; 
    font-size: 20px; 
    text-align: center;
  }

  /* Linhas de métricas */
  .metrics-row { 
    display: flex; 
    justify-content: center; 
    margin: 8px 0; 
    gap: 12px; 
    flex-wrap: wrap;
    width: 100%;
  }

  /* Retângulos de métricas */
  .metric-rect {
    border-radius: 12px;  
    padding: 5px 12px;  
    color: #000; 
    font-weight: bold;
    font-size: 16px;    
    text-align: center;
    min-width: 60px;
    flex: 1 1 auto;
  }

  /* Weather code */
  .weather-code {
    background: #e0e0e0; 
    color: #000;
    border-radius: 12px;
    padding: 10px 14px;
    text-align: center;
    width: 100%;
    font-weight: bold;
  }

  /* CAPE + LI card */
  .cape-li {
    background: #ffc43b;
    color: #000;
    border-radius: 12px;
    padding: 10px 14px;
    text-align: center;
    width: 100%;
    font-weight: bold;
  }

  .wind-speed, .wind-gusts {
    background-color: #9fff9c;
  }

  .temp-min {
    background-color: lightskyblue;
  }

  .temp-max {
    background-color: lightcoral;
  }

  .precipitation {
    background-color: lightskyblue;
  }

  .sensacao-termica, .temperatura-agora {
    background-color: lightcoral;
  }

  @media (max-width: 600px) {
    .search-bar {
      flex-direction: column;
      align-items: center;
    }
    .search-bar input[type="text"],
    .search-bar button {
      width: 90%;
      max-width: 300px;
    }
  }
</style>
</head>
<body>

<div class="search-bar">
  <input type="text" id="locationInput" placeholder="Digite cidade">
  <button id="searchBtn">Buscar</button>
  <button id="geoBtn">Usar localização</button>
</div>

<h1 id="cidade"></h1>

<div class="dashboard" id="dashboard"></div>

<script>
const weatherCodes = {
  0: "Céu limpo", 1: "Principalmente limpo", 2: "Parcialmente nublado", 3: "Nublado",
  45: "Neblina", 48: "Nevoeiro com gelo", 51: "Chuva fraca", 53: "Chuva moderada",
  55: "Chuva forte", 56: "Chuva gelada fraca", 57: "Chuva gelada forte",
  61: "Chuva leve", 63: "Chuva moderada", 65: "Chuva intensa", 66: "Chuva gelada leve",
  67: "Chuva gelada intensa", 71: "Queda de neve leve", 73: "Queda de neve moderada",
  75: "Queda de neve intensa", 77: "Neve granulada", 80: "Pancadas de chuva leves",
  81: "Pancadas de chuva moderadas", 82: "Pancadas de chuva fortes", 85: "Neve leve",
  86: "Neve intensa", 95: "Tempestade", 96: "Tempestade com granizo leve",
  99: "Tempestade com granizo forte"
};

// Geocoding
async function getCoordinates(cityName) {
  const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(cityName)}&format=json&limit=1&accept-language=pt`;
  const resp = await fetch(url);
  const data = await resp.json();
  if (data.length === 0) throw new Error("Cidade não encontrada");
  return { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon) };
}

// API Open-Meteo
async function fetchWeather(lat=-9.7811, lon=-36.0936) {
  const apiUrl = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weather_code,temperature_2m_max,temperature_2m_min,apparent_temperature_max,apparent_temperature_min,uv_index_clear_sky_max,uv_index_max,sunshine_duration,daylight_duration,sunset,sunrise,rain_sum,showers_sum,snowfall_sum,precipitation_sum,precipitation_hours,precipitation_probability_max,et0_fao_evapotranspiration,shortwave_radiation_sum,wind_direction_10m_dominant,wind_gusts_10m_max,wind_speed_10m_max&hourly=cape,lifted_index,uv_index,uv_index_clear_sky,is_day,sunshine_duration,wet_bulb_temperature_2m,total_column_integrated_water_vapour,boundary_layer_height,freezing_level_height,convective_inhibition,cloud_cover,temperature_2m,relative_humidity_2m,dew_point_2m,apparent_temperature,precipitation,precipitation_probability,rain,snowfall,snow_depth,showers,vapour_pressure_deficit,et0_fao_evapotranspiration,evapotranspiration,visibility,cloud_cover_high,cloud_cover_mid,cloud_cover_low,surface_pressure,pressure_msl,weather_code,wind_speed_10m,wind_speed_80m,wind_speed_180m,wind_speed_120m,wind_direction_10m,wind_direction_80m,wind_direction_120m,wind_direction_180m,wind_gusts_10m,temperature_80m,temperature_120m,temperature_180m,soil_moisture_27_to_81cm,soil_moisture_9_to_27cm,soil_moisture_3_to_9cm,soil_moisture_1_to_3cm,soil_moisture_0_to_1cm,soil_temperature_54cm,soil_temperature_18cm,soil_temperature_6cm,soil_temperature_0cm&current=temperature_2m,apparent_temperature,precipitation,wind_speed_10m,wind_gusts_10m,weather_code&timezone=auto&forecast_days=16
`;
  const resp = await fetch(apiUrl);
  const data = await resp.json();
  return data;
}

// Nome completo da cidade
async function fetchLocationName(lat, lon) {
  const url = `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=pt`;
  try {
    const resp = await fetch(url);
    const data = await resp.json();
    const city = data.address.city || data.address.town || data.address.village || "";
    const state = data.address.state || "";
    const country = data.address.country || "";
    return [city, state, country].filter(Boolean).join(", ");
  } catch {
    return "Localização desconhecida";
  }
}

// Função que decide a descrição do CAPE + LI
function describeCAPE_LI(cape, li) {
  if (cape >= 1000 && li <= -2) {
    if (cape < 2500 && li > -6) return "Risco de tempestades isoladas";
    if (cape >= 2500 || li <= -6) return "Possível tempestade forte";
  }
  return null; // se for fraco ou estável, não exibe
}

// Formata data/hora: Segunda, dd/mm, hh:mm
function formatCurrentDateTime(dateStr) {
  const date = new Date(dateStr);
  const weekday = date.toLocaleDateString("pt-BR", { weekday: "long" });
  const dayMonth = date.toLocaleDateString("pt-BR", { day: "2-digit", month: "2-digit" });
  const time = date.toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" });
  return `${weekday.charAt(0).toUpperCase() + weekday.slice(1)}, ${dayMonth}, ${time}`;
}

// Formata data: Segunda, dd/mm
function formatDateWithWeekday(dateStr) {
  const date = new Date(dateStr + "T00:00:00");
  const weekday = date.toLocaleDateString("pt-BR", { weekday: "long" });
  const dayMonth = date.toLocaleDateString("pt-BR", { day: "2-digit", month: "2-digit" });
  return weekday.charAt(0).toUpperCase() + weekday.slice(1) + ", " + dayMonth;
}

// Cria card "Atual"
function createCurrentCard(current) {
  const card = document.createElement("div");
  card.className = "card";

  const dateEl = document.createElement("div");
  dateEl.className = "card-date";
  dateEl.textContent = formatCurrentDateTime(current.time);
  card.appendChild(dateEl);

  const row1 = document.createElement("div"); row1.className="metrics-row";
  row1.appendChild(Object.assign(document.createElement("div"), { className:"metric-rect temperatura-agora", textContent:`🌡️ Temperatura: ${Math.round(current.temperature_2m)}°` }));
  row1.appendChild(Object.assign(document.createElement("div"), { className:"metric-rect sensacao-termica", textContent:`🌡️ Sensação: ${Math.round(current.apparent_temperature)}°` }));
  card.appendChild(row1);

  const row2 = document.createElement("div"); row2.className="metrics-row";
  row2.appendChild(Object.assign(document.createElement("div"), { className:"metric-rect precipitation", textContent:`☔ ${current.precipitation.toFixed(1)} mm` }));
  card.appendChild(row2);

  const row3 = document.createElement("div"); row3.className="metrics-row";
  row3.appendChild(Object.assign(document.createElement("div"), { className:"metric-rect wind-speed", textContent:`🍃 Ventos: ${Math.round(current.wind_speed_10m)} km/h` }));
  row3.appendChild(Object.assign(document.createElement("div"), { className:"metric-rect wind-gusts", textContent:`🍃 Rajadas: ${Math.round(current.wind_gusts_10m)} km/h` }));
  card.appendChild(row3);

  const row4 = document.createElement("div"); row4.className="metrics-row";
  row4.appendChild(Object.assign(document.createElement("div"), { className:"weather-code", textContent:weatherCodes[current.weather_code] || "Desconhecido" }));
  card.appendChild(row4);

  // CAPE + LI
  const capeDescription = describeCAPE_LI(current.cape, current.lifted_index);
  if (capeDescription) {
    const row5 = document.createElement("div"); row5.className="metrics-row";
    row5.appendChild(Object.assign(document.createElement("div"), { className:"cape-li", textContent: capeDescription }));
    card.appendChild(row5);
  }

  return card;
}

// Cria cards diários
function createDailyCard(day, tempMin, tempMax, precipitation, windSpeed, windGusts, weatherCode, cape, li) {
  const card = document.createElement("div");
  card.className = "card";

  const dateEl = document.createElement("div");
  dateEl.className = "card-date";
  dateEl.textContent = formatDateWithWeekday(day);
  card.appendChild(dateEl);

  const row1 = document.createElement("div"); row1.className="metrics-row";
  row1.appendChild(Object.assign(document.createElement("div"), { className:"metric-rect temp-min", textContent:`🌡️ Mínima: ${Math.round(tempMin)}°` }));
  row1.appendChild(Object.assign(document.createElement("div"), { className:"metric-rect temp-max", textContent:`🌡️ Máxima: ${Math.round(tempMax)}°` }));
  card.appendChild(row1);

  const row2 = document.createElement("div"); row2.className="metrics-row";
  row2.appendChild(Object.assign(document.createElement("div"), { className:"metric-rect precipitation", textContent:`☔ ${precipitation.toFixed(1)} mm` }));
  card.appendChild(row2);

  const row3 = document.createElement("div"); row3.className="metrics-row";
  row3.appendChild(Object.assign(document.createElement("div"), { className:"metric-rect wind-speed", textContent:`🍃 Ventos: ${Math.round(windSpeed)} km/h` }));
  row3.appendChild(Object.assign(document.createElement("div"), { className:"metric-rect wind-gusts", textContent:`🍃 Rajadas: ${Math.round(windGusts)} km/h` }));
  card.appendChild(row3);

  const row4 = document.createElement("div"); row4.className="metrics-row";
  row4.appendChild(Object.assign(document.createElement("div"), { className:"weather-code", textContent:weatherCodes[weatherCode] || "Desconhecido" }));
  card.appendChild(row4);

  // CAPE + LI
  const capeDescription = describeCAPE_LI(cape, li);
  if (capeDescription) {
    const row5 = document.createElement("div"); row5.className="metrics-row";
    row5.appendChild(Object.assign(document.createElement("div"), { className:"cape-li", textContent: capeDescription }));
    card.appendChild(row5);
  }

  return card;
}

// Renderiza dashboard
async function renderDashboard(lat=-9.7811, lon=-36.0936) {
  try {
    const data = await fetchWeather(lat, lon);
    const dashboard = document.getElementById("dashboard");
    dashboard.innerHTML = "";

    document.getElementById("cidade").textContent = await fetchLocationName(lat, lon);

    // Card atual
    if (data.current) {
      const currentCard = createCurrentCard(data.current);
      dashboard.appendChild(currentCard);
    }

    // Cards diários
    const daily = data.daily;
    const hourly = data.hourly;
    for (let i = 0; i < daily.time.length; i++) {
      // Pegando CAPE e LI do horário próximo ao meio do dia
      const hourIndex = i*24 + 12; // aproximadamente meio do dia
      const cape = hourly.cape[hourIndex] || 0;
      const li = hourly.lifted_index[hourIndex] || 0;

      const card = createDailyCard(
        daily.time[i],
        daily.temperature_2m_min[i],
        daily.temperature_2m_max[i],
        daily.precipitation_sum[i],
        daily.wind_speed_10m_max[i],
        daily.wind_gusts_10m_max[i],
        daily.weather_code[i],
        cape,
        li
      );
      dashboard.appendChild(card);
    }
  } catch (err) {
    console.error("Erro ao carregar dados:", err.message);
    document.getElementById("cidade").textContent = "Localização padrão";
  }
}

// Botão buscar
document.getElementById("searchBtn").addEventListener("click", async () => {
  const input = document.getElementById("locationInput").value.trim();
  if (!input) return alert("Digite uma cidade!");
  try {
    const coords = await getCoordinates(input);
    renderDashboard(coords.lat, coords.lon);
  } catch {
    alert("Cidade não encontrada.");
  }
});

// Botão usar localização
document.getElementById("geoBtn").addEventListener("click", () => {
  if (!navigator.geolocation) return alert("Geolocalização não suportada neste navegador.");
  navigator.geolocation.getCurrentPosition((pos) => {
    renderDashboard(pos.coords.latitude, pos.coords.longitude);
  }, () => alert("Não foi possível obter a localização."));
});

// Inicial
renderDashboard();
</script>

</body>
</html>
