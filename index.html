<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Clima Visual</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f9fafb;
    --primary:#0ea5e9;
    --danger:#ef4444;
    --alert:#facc15;
    --radius:12px;
    --text:#1f2937;
    --secondary:#64748b;
    --card-bg:#ffffff;
    --shadow:0 4px 12px rgba(0,0,0,0.1);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:Inter, sans-serif;
    background:var(--bg);
    color:var(--text);
    padding:20px;
  }

  header{
    display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap;
  }
  header h1{
    font-size:28px; color:var(--primary);
  }
  .searchbox{display:flex;gap:10px; margin-top:10px;}
  .searchbox input{padding:10px 14px;border-radius:var(--radius);border:1px solid var(--secondary); flex:1; background:#fff;color:var(--text);}
  .searchbox button{padding:10px 16px;border:none;border-radius:var(--radius);background:var(--primary);color:#fff;font-weight:600;cursor:pointer;}

  .days-container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
  }

  .day-card{
    border-radius:var(--radius);
    padding:16px;
    background:var(--card-bg);
    box-shadow:var(--shadow);
    transition:transform 0.3s;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .day-card:hover{
    transform:scale(1.03);
  }

  .day-header{
    display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;
  }
  .day-date{font-weight:700; font-size:16px;}
  .temp-range{font-weight:800; font-size:20px; color:var(--primary);}
  
  .metrics{
    display:flex; flex-direction:column; gap:6px;
    font-size:14px;
    color:var(--secondary);
  }

  .alert-bubble{
    align-self:flex-start;
    background:var(--alert);
    color:#000;
    padding:6px 10px;
    border-radius:50px;
    font-size:12px;
    font-weight:600;
    margin-top:10px;
  }

  @media(max-width:768px){
    .days-container{grid-template-columns:1fr;}
    .searchbox{width:100%;}
  }
</style>
</head>
<body>
<header>
  <h1>Previsão do tempo</h1>
  <div class="searchbox">
    <input id="cityInput" placeholder="Digite uma cidade">
    <button id="searchBtn">Buscar</button>
  </div>
</header>

<main>
  <div id="cardsContainer" class="days-container">
    <div class="day-card">
      <div class="day-header">
        <div class="day-date">—</div>
        <div class="temp-range">—° / —°</div>
      </div>
      <div class="metrics">Pesquise uma cidade para ver a previsão</div>
    </div>
  </div>
</main>

<script>
const $ = id=>document.getElementById(id);
let currentUnits='metric';

function fmt(v){return v==null?'—':Math.round(v);}
function toF(c){return (c*9/5)+32;}
function formatDate(d){const dias=["Domingo","Segunda","Terça","Quarta","Quinta","Sexta","Sábado"]; const [y,m,day]=d.split('-'); const dt=new Date(`${y}-${m}-${day}T12:00:00`); return `${day}/${m} • ${dias[dt.getDay()]}`;}

async function getCoordinates(city){
  const res=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=pt`);
  if(!res.ok)throw new Error('Erro na geocodificação');
  const data=await res.json();
  return data.results&&data.results.length>0?data.results[0]:null;
}

function generateAlerts(day){
  const alerts=[];
  if(day.precipitation_sum>=20)alerts.push('Chuva intensa');
  if(day.wind_gusts_10m_max>=40)alerts.push('Atenção a rajadas de vento');
  if(day.relative_humidity_2m_min<=30)alerts.push('Umidade baixa');
  return alerts;
}

function cloudDescription(percent){
  if(percent<20)return 'Poucas nuvens';
  if(percent<50)return 'Parcialmente nublado';
  if(percent<80)return 'Muitas nuvens';
  return 'Nublado';
}

function uvDescription(index){
  if(index<=2)return 'UV Baixo';
  if(index<=5)return 'UV Moderado';
  if(index<=7)return 'UV Alto';
  if(index<=10)return 'UV Muito Alto';
  return 'UV Extremo';
}

async function loadForecast(lat,lon){
  const container=$('cardsContainer');
  container.innerHTML='<div class="day-card"><div class="metrics">Carregando...</div></div>';
  try{
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,wind_speed_10m_max,wind_gusts_10m_max,relative_humidity_2m_min,relative_humidity_2m_max,cloud_cover_mean,uv_index_max&timezone=auto&forecast_days=14`;
    const r=await fetch(url);
    if(!r.ok)throw new Error('Erro ao obter previsão');
    const data=await r.json();
    if(!data.daily||!data.daily.time){container.innerHTML='<div class="day-card">Sem dados</div>';return;}

    container.innerHTML='';
    const days=data.daily.time;
    for(let i=0;i<days.length;i++){
      let tMin=data.daily.temperature_2m_min[i];
      let tMax=data.daily.temperature_2m_max[i];
      if(currentUnits==='imperial'){tMin=toF(tMin);tMax=toF(tMax);}
      const dayData={
        precipitation_sum:data.daily.precipitation_sum[i],
        wind_speed_10m_max:data.daily.wind_speed_10m_max[i],
        wind_gusts_10m_max:data.daily.wind_gusts_10m_max[i],
        relative_humidity_2m_min:data.daily.relative_humidity_2m_min[i],
        relative_humidity_2m_max:data.daily.relative_humidity_2m_max[i],
        cloud_cover_mean:data.daily.cloud_cover_mean[i],
        uv_index_max:data.daily.uv_index_max[i]
      };
      const card=document.createElement('div');
      card.className='day-card';
      const alerts=generateAlerts(dayData);
      card.innerHTML=`
        <div class="day-header">
          <div class="day-date">${formatDate(days[i])}</div>
          <div class="temp-range">${fmt(tMin)}° / ${fmt(tMax)}°</div>
        </div>
        <div class="metrics">
          ☔ Chuva: ${fmt(dayData.precipitation_sum)} mm<br>
          🍃 Vento: ${fmt(dayData.wind_speed_10m_max)} km/h<br>
          🍃 Rajadas: ${fmt(dayData.wind_gusts_10m_max)} km/h<br>
          💧 Umidade: ${fmt(dayData.relative_humidity_2m_min)}% a ${fmt(dayData.relative_humidity_2m_max)}%<br>
          ☁️ ${cloudDescription(dayData.cloud_cover_mean)}<br>
          🔆 ${uvDescription(dayData.uv_index_max)}
        </div>
        ${alerts.length?`<div class="alert-bubble">${alerts.join(' • ')}</div>`:''}
      `;
      container.appendChild(card);
    }
  }catch(e){container.innerHTML=`<div class="day-card">Erro: ${e.message}</div>`;}
}

$('searchBtn').addEventListener('click',async ()=>{
  const city=$('cityInput').value.trim();
  if(!city)return;
  try{
    const geo=await getCoordinates(city);
    if(!geo){alert('Cidade não encontrada'); return;}
    await loadForecast(geo.latitude,geo.longitude);
  }catch(e){alert('Erro: '+e.message);}
});
</script>
</body>
</html>
