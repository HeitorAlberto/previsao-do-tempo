<!DOCTYPE html>
<html lang="pt-BR">

<head>
	<meta charset="utf-8" />
	<title>Previsão de Chuva ECMWF</title>

	<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
	<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

	<style>
		html,
		body {
			height: 100%;
			margin: 0;
			font-family: system-ui, -apple-system, sans-serif;
			overflow: hidden;
		}

		#map {
			height: 100vh;
			width: 100%;
			background: #ffffff;
		}

		.controls {
			position: absolute;
			top: 20px;
			right: 20px;
			z-index: 1000;

			background: rgba(255, 255, 255, 0.96);

			backdrop-filter: blur(8px);

			padding: 15px;

			border-radius: 12px;

			box-shadow: 0 4px 20px rgba(0, 0, 0, 0.18);

			width: 220px;
		}

		.btn-grid {
			display: flex;
			flex-direction: column;
			gap: 6px;
			margin-top: 10px;
		}

		button {
			padding: 10px;

			cursor: pointer;

			border: 1px solid #e0e0e0;

			background: #f8f9fa;

			border-radius: 8px;

			font-weight: 700;

			text-align: left;

			transition: all 0.15s ease;
		}

		button:hover {
			background: #eceff1;
		}

		button.active {
			background: #28a745;
			color: white;
			border-color: #1e7e34;
		}

		#status {
			font-size: 13px;
			margin-top: 10px;
			color: #555;
			font-weight: 500;
		}

		.legend {
			background: rgba(255, 255, 255, 0.96);

			padding: 10px 12px;

			border-radius: 10px;

			box-shadow: 0 0 18px rgba(0, 0, 0, 0.18);

			line-height: 20px;

			font-size: 13px;
		}

		.legend i {
			width: 14px;
			height: 14px;
			float: left;
			margin-right: 8px;
			border-radius: 3px;
			opacity: 0.9;
		}

		.leaflet-control-attribution {
			font-size: 10px;
		}
	</style>
</head>

<body>

	<div class="controls">

		<strong style="font-size:16px;">
			Previsão ECMWF 00h
		</strong>

		<div id="dayButtons" class="btn-grid"></div>

		<div id="status">
			Carregando mapas...
		</div>

	</div>

	<div id="map"></div>

	<script>

		// =====================================================
		// LIMITES BRASIL
		// =====================================================

		const brasilBounds = [
			[-35, -75],
			[6, -30]
		];

		// =====================================================
		// MAPA
		// =====================================================

		const map = L.map('map', {

			center: [-15, -55],

			zoom: 4,

			minZoom: 3,
			maxZoom: 7,

			zoomSnap: 0.25,
			zoomDelta: 0.25,

			wheelPxPerZoomLevel: 140,

			maxBounds: brasilBounds,
			maxBoundsViscosity: 1.0,

			worldCopyJump: false,

			scrollWheelZoom: true,

			zoomAnimation: true,
			fadeAnimation: true,

			inertia: true,
			inertiaDeceleration: 2500,
			inertiaMaxSpeed: 1500,

			preferCanvas: true

		});

		map.fitBounds(brasilBounds);

		// =====================================================
		// BASE SEM LABELS
		// =====================================================

		L.tileLayer(
			'https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png',
			{
				attribution: '&copy; CartoDB',
				updateWhenZooming: false,
				updateWhenIdle: true,
				keepBuffer: 2
			}
		).addTo(map);

		// =====================================================
		// CAMADA CHUVA
		// =====================================================

		let camadaChuva = null;

		// =====================================================
		// METADADOS
		// =====================================================

		fetch("metadados.json")

			.then(res => res.json())

			.then(meta => {

				const container =
					document.getElementById('dayButtons');

				meta.frames.forEach((frame, i) => {

					const btn =
						document.createElement('button');

					btn.innerText = frame.label;

					btn.onclick = (e) => {

						document
							.querySelectorAll('button')
							.forEach(b =>
								b.classList.remove('active')
							);

						e.target.classList.add('active');

						// =====================================
						// REMOVE TILE ANTIGO
						// =====================================

						if (camadaChuva) {

							map.removeLayer(camadaChuva);

						}

						// =====================================
						// TILE LAYER
						// =====================================

						camadaChuva = L.tileLayer(

							`tiles/${frame.id}/{z}/{x}/{y}.png`,

							{
								opacity: 0.82,

								minZoom: 0,
								maxZoom: 5,

								noWrap: true,

								updateWhenZooming: false,
								updateWhenIdle: true,

								keepBuffer: 2
							}

						).addTo(map);

						document.getElementById('status').innerText =
							`Exibindo: ${frame.label}`;

					};

					container.appendChild(btn);

					if (i === 0) {

						btn.click();

					}

				});

			})

			.catch(err => {

				document.getElementById('status').innerText =
					"Erro ao carregar metadados.json";

				console.error(err);

			});

		// =====================================================
		// ESTADOS
		// =====================================================

		fetch(
			"https://raw.githubusercontent.com/codeforamerica/click_that_hood/master/public/data/brazil-states.geojson"
		)

			.then(res => res.json())

			.then(geojsonData => {

				L.geoJSON(geojsonData, {

					style: {

						color: "#000000",

						weight: 1.2,

						fillColor: "transparent",

						fillOpacity: 0,

						opacity: 0.9

					},

					interactive: false

				}).addTo(map);

			})

			.catch(err =>
				console.error(
					"Erro ao carregar estados:",
					err
				)
			);

		// =====================================================
		// LABELS
		// =====================================================

		L.tileLayer(
			'https://{s}.basemaps.cartocdn.com/rastertiles/voyager_only_labels/{z}/{x}/{y}{r}.png',
			{
				zIndex: 1000,

				pane: 'markerPane',

				opacity: 0.92,

				updateWhenZooming: false,

				updateWhenIdle: true
			}
		).addTo(map);

		// =====================================================
		// LEGENDA
		// =====================================================

		const legend = L.control({
			position: 'bottomright'
		});

		legend.onAdd = function () {

			const div = L.DomUtil.create(
				'div',
				'legend'
			);

			const cores = [

				'#BDBDBD',
				'#81C784',
				'#1B5E20',
				'#4FC3F7',
				'#0D47A1',
				'#FFFF8D',
				'#FDD835',
				'#FB8C00',
				'#E65100',
				'#ff5959',
				'#a10e0e',
				'#8D6E63',
				'#5D4037',
				'#DDA0DD',
				'#9370DB'

			];

			const grades = [

				1, 3, 6, 10, 15,
				20, 30, 40, 50,
				75, 100, 150,
				200, 300, 400

			];

			div.innerHTML =
				'<strong>Chuva (mm)</strong><br>';

			for (let i = 0; i < grades.length; i++) {

				div.innerHTML +=

					'<i style="background:' +
					cores[i] +
					'"></i>' +

					grades[i] +

					(grades[i + 1]
						? '&ndash;' + grades[i + 1] + '<br>'
						: '+');
			}

			return div;
		};

		legend.addTo(map);

	</script>

</body>

</html>
