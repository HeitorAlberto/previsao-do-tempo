<!doctype html>
<html lang="pt-BR">

<head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1">
        <title>Previsão 15 dias - Mapas diários</title>
        <link rel="icon" href="icone.ico" type="image/x-icon">

        <style>

                body {
                        margin: 0;
                }

                /* ===== DESKTOP ===== */
                @media (min-width: 801px) {

                        #viewer {
                                position: relative;
                                width: 100%;
                                height: 100vh;
                                padding: 0;
                        }

                        #viewer a {
                                display: contents;
                        }

                        #viewer img {
                                display: none;
                                height: 100vh;
                                width: auto;
                                margin: 0 auto;
                                object-fit: contain;
                        }

                        #viewer img.active {
                                display: block;
                        }

                        button {
                                position: fixed;
                                top: 50%;
                                transform: translateY(-50%);
                                background: rgba(0, 0, 0, 0.6);
                                color: #fff;
                                border: none;
                                padding: 14px 18px;
                                cursor: pointer;
                                z-index: 1000;
                                border-radius: 8px;
                        }

                        #prev {
                                left: 10px;
                        }

                        #next {
                                right: 10px;
                        }

                }

                /* ===== MOBILE ===== */
                @media (max-width: 800px) {
                        #viewer {
                                padding: 20px 0;
                        }

                        #viewer a {
                                display: block;
                        }

                        #viewer img {
                                width: 100%;
                                display: block;
                                margin-bottom: 40px;
                        }

                        button {
                                display: none;
                        }
                }
        </style>
</head>

<body>

        <div id="viewer">
                <button id="prev">Anterior</button>
                <button id="next">Próximo</button>

                <a href="mapas/01.webp" target="_blank"><img src="mapas/01.webp" class="active"></a>
                <a href="mapas/02.webp" target="_blank"><img src="mapas/02.webp"></a>
                <a href="mapas/03.webp" target="_blank"><img src="mapas/03.webp"></a>
                <a href="mapas/04.webp" target="_blank"><img src="mapas/04.webp"></a>
                <a href="mapas/05.webp" target="_blank"><img src="mapas/05.webp"></a>
                <a href="mapas/06.webp" target="_blank"><img src="mapas/06.webp"></a>
                <a href="mapas/07.webp" target="_blank"><img src="mapas/07.webp"></a>
                <a href="mapas/08.webp" target="_blank"><img src="mapas/08.webp"></a>
                <a href="mapas/09.webp" target="_blank"><img src="mapas/09.webp"></a>
                <a href="mapas/10.webp" target="_blank"><img src="mapas/10.webp"></a>
                <a href="mapas/11.webp" target="_blank"><img src="mapas/11.webp"></a>
                <a href="mapas/12.webp" target="_blank"><img src="mapas/12.webp"></a>
                <a href="mapas/13.webp" target="_blank"><img src="mapas/13.webp"></a>
                <a href="mapas/14.webp" target="_blank"><img src="mapas/14.webp"></a>
                <a href="mapas/15.webp" target="_blank"><img src="mapas/15.webp"></a>
                <a href="mapas/acumulado-15-dias.webp" target="_blank"><img src="mapas/acumulado-15-dias.webp"></a>

        </div>

        <script>
                if (window.matchMedia('(min-width: 801px)').matches) {

                        const images = document.querySelectorAll('#viewer img');
                        let index = 0;

                        const lens = document.getElementById('lens');

                        function showImage(i) {
                                images[index].classList.remove('active');
                                index = Math.max(0, Math.min(i, images.length - 1));
                                images[index].classList.add('active');
                        }

                        document.getElementById('prev').onclick = () => showImage(index - 1);
                        document.getElementById('next').onclick = () => showImage(index + 1);

                        document.addEventListener('keydown', e => {
                                if (e.key === 'ArrowLeft') showImage(index - 1);
                                if (e.key === 'ArrowRight') showImage(index + 1);
                        });

                }
        </script>

</body>

</html>
