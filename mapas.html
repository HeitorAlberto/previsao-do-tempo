<!DOCTYPE html>
<html lang="pt-BR">

<head>
	<meta charset="utf-8" />
	<title>Previsão de Chuva ECMWF - Imagens Otimizadas</title>
	<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
	<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
	<style>
		html,
		body {
			height: 100%;
			margin: 0;
			font-family: system-ui, -apple-system, sans-serif;
		}

		#map {
			height: 100vh;
			width: 100%;
			background: #ffffff;
		}

		.controls {
			position: absolute;
			top: 20px;
			right: 20px;
			z-index: 1000;
			background: white;
			padding: 15px;
			border-radius: 8px;
			box-shadow: 0 4px 15px rgba(0, 0, 0, 0.25);
			width: 220px;
		}

		.btn-grid {
			display: flex;
			flex-direction: column;
			gap: 6px;
			margin-top: 10px;
		}

		button {
			padding: 10px;
			cursor: pointer;
			border: 1px solid #e0e0e0;
			background: #f8f9fa;
			border-radius: 6px;
			font-weight: bold;
			text-align: left;
			transition: all 0.2s ease;
		}

		button:hover {
			background: #e9ecef;
		}

		button.active {
			background: #28a745;
			color: white;
			border-color: #1e7e34;
		}

		#status {
			font-size: 13px;
			margin-top: 10px;
			color: #666;
			font-weight: 500;
		}

		/* Força a imagem a suavizar as bordas ao aplicar zoom no mapa */
		.leaflet-image-layer {
			image-rendering: -webkit-optimize-contrast;
			image-rendering: crisp-edges;
		}
	</style>
</head>

<body>

	<div class="controls">
		<strong style="font-size: 16px;">Previsão ECMWF 00h</strong>
		<div id="dayButtons" class="btn-grid"></div>
		<div id="status">Carregando mapas de alto desempenho...</div>
	</div>

	<div id="map"></div>

	<script>
		// 1. Inicializa o mapa base
		const map = L.map('map').setView([-15, -55], 4);

		// [SANDUÍCHE - CAMADA 1: BASE] Fundo limpo e sem textos
		L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png', {
			attribution: '&copy; CartoDB'
		}).addTo(map);

		// Instancia a camada de imagem vazia que ocupará o meio do sanduíche
		let camadaImagemChuva = null;

		// 2. Carrega as Configurações Leves do Servidor
		fetch("metadados.json")
			.then(res => res.json())
			.then(meta => {
				const container = document.getElementById('dayButtons');
				const bounds = meta.bounds; // Pega o limite geográfico do Brasil definido pelo Python

				meta.frames.forEach((frame, i) => {
					const btn = document.createElement('button');
					btn.innerText = frame.label;
					btn.onclick = (e) => {
						document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
						e.target.classList.add('active');

						// [MÁGICA DE PERFORMANCE]: Em vez de redesenhar pontos, apenas atualizamos a URL do PNG
						if (!camadaImagemChuva) {
							camadaImagemChuva = L.imageOverlay(frame.arquivo, bounds, {
								opacity: 0.75,
								interactive: false
							}).addTo(map);
						} else {
							camadaImagemChuva.setUrl(frame.arquivo);
						}

						document.getElementById('status').innerText = `Exibindo: ${frame.label}`;
					};
					container.appendChild(btn);
					if (i === 0) btn.click();
				});
			})
			.catch(err => {
				document.getElementById('status').innerText = "Erro ao carregar metadados.json";
				console.error(err);
			});

		// [SANDUÍCHE - CAMADA 2: VETORES] Fronteiras dos Estados pretas e nítidas por cima do PNG
		fetch("https://raw.githubusercontent.com/codeforamerica/click_that_hood/master/public/data/brazil-states.geojson")
			.then(res => res.json())
			.then(geojsonData => {
				L.geoJSON(geojsonData, {
					style: {
						color: "#000000",
						weight: 2,
						fillColor: "transparent",
						fillOpacity: 0
					},
					interactive: false
				}).addTo(map);
			})
			.catch(err => console.error("Erro ao carregar bordas dos estados:", err));

		// [SANDUÍCHE - CAMADA 3: TOP LABELS] Nomes das Cidades no TOPO absoluto flutuando sobre a imagem
		L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_only_labels/{z}/{x}/{y}{r}.png', {
			zIndex: 1000,
			pane: 'markerPane',
			opacity: 0.9
		}).addTo(map);

		// 3. Legenda Dinâmica da Escala de Cores
		const legend = L.control({ position: 'bottomright' });
		legend.onAdd = function (map) {
			const div = L.DomUtil.create('div', 'info legend');
			const cores = ['#BDBDBD', '#81C784', '#1B5E20', '#4FC3F7', '#0D47A1', '#FFFF8D', '#FDD835', '#FB8C00', '#E65100', '#ff5959', '#a10e0e', '#8D6E63', '#5D4037', '#DDA0DD', '#9370DB'];
			const grades = [1, 3, 6, 10, 15, 20, 30, 40, 50, 75, 100, 150, 200, 300, 400];

			div.innerHTML = '<strong>Chuva (mm)</strong><br>';
			for (let i = 0; i < grades.length; i++) {
				div.innerHTML +=
					'<i style="background:' + cores[i] + '; width: 14px; height: 14px; float: left; margin-right: 8px; opacity: 0.8; border: 1px solid #999;"></i> ' +
					grades[i] + (grades[i + 1] ? '&ndash;' + grades[i + 1] + '<br>' : '+');
			}
			div.style.background = 'white'; div.style.padding = '10px'; div.style.lineHeight = '22px';
			div.style.borderRadius = '5px'; div.style.boxShadow = '0 0 15px rgba(0,0,0,0.2)'; div.style.fontSize = '18px';
			return div;
		};
		legend.addTo(map);

	</script>
</body>

</html>
