<!DOCTYPE html>
<html lang="pt-BR">

<head>
	<meta charset="utf-8" />
	<title>Previsão de Chuva ECMWF</title>
	<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
	<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
	<style>
		html,
		body {
			height: 100%;
			margin: 0;
			font-family: system-ui, -apple-system, sans-serif;
		}

		#map {
			height: 100vh;
			width: 100%;
			background: #ffffff;
		}

		.controls {
			position: absolute;
			top: 20px;
			right: 20px;
			z-index: 1000;
			background: white;
			padding: 15px;
			border-radius: 8px;
			box-shadow: 0 4px 15px rgba(0, 0, 0, 0.25);
			width: 220px;
		}

		.btn-grid {
			display: flex;
			flex-direction: column;
			gap: 6px;
			margin-top: 10px;
		}

		button {
			padding: 10px;
			cursor: pointer;
			border: 1px solid #e0e0e0;
			background: #f8f9fa;
			border-radius: 6px;
			font-weight: bold;
			text-align: left;
			transition: all 0.2s ease;
		}

		button:hover {
			background: #e9ecef;
		}

		button.active {
			background: #28a745;
			color: white;
			border-color: #1e7e34;
		}

		#status {
			font-size: 13px;
			margin-top: 10px;
			color: #666;
			font-weight: 500;
		}

		/* Força a imagem a suavizar as bordas ao aplicar zoom no mapa */
		.leaflet-image-layer {
			image-rendering: -webkit-optimize-contrast;
			image-rendering: crisp-edges;
		}
	</style>
</head>

<body>

	<div class="controls">
		<strong style="font-size: 16px;">Previsão ECMWF 00h</strong>
		<div id="dayButtons" class="btn-grid"></div>
		<div id="status">Carregando mapas de alto desempenho...</div>
	</div>

	<div id="map"></div>

	<script>

		// =====================================================
		// LIMITES DO BRASIL
		// =====================================================

		const brasilBounds = [
			[-35, -75],
			[6, -30]
		];

		// =====================================================
		// MAPA
		// =====================================================

		const map = L.map('map', {

			center: [-15, -55],

			zoom: 4,

			minZoom: 3,
			maxZoom: 7,

			zoomSnap: 0.25,
			zoomDelta: 0.25,

			wheelPxPerZoomLevel: 140,

			maxBounds: brasilBounds,
			maxBoundsViscosity: 1.0,

			worldCopyJump: false,

			scrollWheelZoom: true,

			zoomAnimation: true,
			fadeAnimation: true,

			inertia: true,
			inertiaDeceleration: 2500,
			inertiaMaxSpeed: 1500,

			preferCanvas: true

		});

		map.fitBounds(brasilBounds);

		// =====================================================
		// BASE
		// =====================================================

		L.tileLayer(
			'https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png',
			{
				attribution: '&copy; CartoDB',
				updateWhenZooming: false,
				updateWhenIdle: true,
				keepBuffer: 2
			}
		).addTo(map);

		// =====================================================
		// CAMADA CHUVA
		// =====================================================

		let camadaChuva = null;

		// =====================================================
		// METADADOS
		// =====================================================

		fetch("metadados.json")

			.then(res => res.json())

			.then(meta => {

				const container = document.getElementById('dayButtons');

				meta.frames.forEach((frame, i) => {

					const btn = document.createElement('button');

					btn.innerText = frame.label;

					btn.onclick = (e) => {

						document
							.querySelectorAll('button')
							.forEach(b => b.classList.remove('active'));

						e.target.classList.add('active');

						// REMOVE TILE ANTERIOR

						if (camadaChuva) {

							map.removeLayer(camadaChuva);

						}

						// =================================================
						// NOVA CAMADA TILE WEBP
						// =================================================

						camadaChuva = L.tileLayer(

							`tiles/${frame.id}/{z}/{x}/{y}.webp`,

							{
								tms: false,
								opacity: 0.82,
								updateWhenZooming: false,
								updateWhenIdle: true,
								keepBuffer: 2,
								bounds: brasilBounds
							}

						).addTo(map);

						document.getElementById('status').innerText =
							`Exibindo: ${frame.label}`;

					};

					container.appendChild(btn);

					if (i === 0) {

						btn.click();

					}

				});

			})

			.catch(err => {

				document.getElementById('status').innerText =
					"Erro ao carregar metadados.json";

				console.error(err);

			});

		// =====================================================
		// ESTADOS
		// =====================================================

		fetch(
			"https://raw.githubusercontent.com/codeforamerica/click_that_hood/master/public/data/brazil-states.geojson"
		)

			.then(res => res.json())

			.then(geojsonData => {

				L.geoJSON(geojsonData, {

					style: {
						color: "#000000",
						weight: 1.2,
						fillColor: "transparent",
						fillOpacity: 0,
						opacity: 0.9
					},

					interactive: false

				}).addTo(map);

			});

		// =====================================================
		// LABELS
		// =====================================================

		L.tileLayer(
			'https://{s}.basemaps.cartocdn.com/rastertiles/voyager_only_labels/{z}/{x}/{y}{r}.png',
			{
				zIndex: 1000,
				pane: 'markerPane',
				opacity: 0.92,
				updateWhenZooming: false,
				updateWhenIdle: true
			}
		).addTo(map);

		// =====================================================
		// LEGENDA
		// =====================================================

		const legend = L.control({
			position: 'bottomright'
		});

		legend.onAdd = function () {

			const div = L.DomUtil.create(
				'div',
				'legend'
			);

			const cores = [
				'#BDBDBD',
				'#81C784',
				'#1B5E20',
				'#4FC3F7',
				'#0D47A1',
				'#FFFF8D',
				'#FDD835',
				'#FB8C00',
				'#E65100',
				'#ff5959',
				'#a10e0e',
				'#8D6E63',
				'#5D4037',
				'#DDA0DD',
				'#9370DB'
			];

			const grades = [
				1, 3, 6, 10, 15,
				20, 30, 40, 50,
				75, 100, 150,
				200, 300, 400
			];

			div.innerHTML =
				'<strong>Chuva (mm)</strong><br>';

			for (let i = 0; i < grades.length; i++) {

				div.innerHTML +=
					'<i style="background:' + cores[i] + '"></i>' +
					grades[i] +
					(grades[i + 1]
						? '&ndash;' + grades[i + 1] + '<br>'
						: '+');
			}

			return div;
		};

		legend.addTo(map);

	</script>
</body>

</html>
