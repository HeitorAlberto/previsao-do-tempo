<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapas de chuva</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
        font-family: "Baloo 2", sans-serif;
        font-size: 1.3rem;
        background: #fff;
        color: #111;
    }

    header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 115px;
        background-color: #000;
        flex-wrap: wrap;
        gap: 20px;
        margin-bottom: 20px;
    }

    #titulo-site {
        color: #ff6c02;
        font-weight: bolder;
        flex-grow: 1;
        text-align: center;
    }

    main {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr;
      gap: 25px;
      justify-items: center;
    }

    main img {
      width: 85%;
    }

    @media (max-width: 1000px) {
      
      main img {
        width: 100%;
      }
        
    }
  </style>
</head>
<body>
  <header>
    <div id="titulo-site">MAPAS DE CHUVA - 10 DIAS</div>
  </header>
  <main>
    <img src="mapas/01.webp" alt="mapa 01">
    <img src="mapas/02.webp" alt="mapa 02">
    <img src="mapas/03.webp" alt="mapa 03">
    <img src="mapas/04.webp" alt="mapa 04">
    <img src="mapas/05.webp" alt="mapa 05">
    <img src="mapas/06.webp" alt="mapa 06">
    <img src="mapas/07.webp" alt="mapa 07">
    <img src="mapas/08.webp" alt="mapa 08">
    <img src="mapas/09.webp" alt="mapa 09">
    <img src="mapas/10.webp" alt="mapa 10">
    <img src="mapas/11.webp" alt="mapa 11">

  </main>
  
</body>
</html>
