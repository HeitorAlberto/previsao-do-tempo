<!doctype html>
<html lang="pt-BR">

<head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1">
        <title>Previsão 15 dias - Mapas diários</title>
        <link rel="icon" href="icone.ico" type="image/x-icon">

        <style>
                @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@100..900&display=swap');

                body {
                        margin: 0;
                        background: #eae9e9;
                        font-family: Roboto, sans-serif;
                }

                /* ===== DESKTOP ===== */
                @media (min-width: 801px) {

                        #viewer {
                                position: relative;
                                width: 100%;
                                height: 100vh;
                                padding: 0;
                        }

                        #viewer a {
                                display: contents;
                        }

                        #viewer img {
                                display: none;
                                height: 100vh;
                                width: auto;
                                margin: 0 auto;
                                object-fit: contain;
                        }

                        #viewer img.active {
                                display: block;
                        }

                        button {
                                position: fixed;
                                top: 50%;
                                transform: translateY(-50%);
                                background: rgba(0, 0, 0, 0.6);
                                color: #fff;
                                border: none;
                                padding: 14px 18px;
                                cursor: pointer;
                                z-index: 1000;
                                border-radius: 8px;
                        }

                        #prev {
                                left: 10px;
                        }

                        #next {
                                right: 10px;
                        }

                        /* ===== LUPA ===== */
                        #lens {
                                position: fixed;
                                width: 250px;
                                height: 250px;
                                border: 2px solid #000;
                                display: none;
                                pointer-events: none;
                                z-index: 999;
                                background-repeat: no-repeat;
                                background-color: #fff;
                        }
                }

                /* ===== MOBILE ===== */
                @media (max-width: 800px) {
                        #viewer {
                                padding: 20px 0;
                        }

                        #viewer a {
                                display: block;
                        }

                        #viewer img {
                                width: 100%;
                                display: block;
                                margin-bottom: 40px;
                        }

                        button {
                                display: none;
                        }
                }
        </style>
</head>

<body>

        <div id="viewer">
                <button id="prev">Anterior</button>
                <button id="next">Próximo</button>

                <a href="mapas/01.webp" target="_blank"><img src="mapas/01.webp" class="active" loading="lazy"></a>
                <a href="mapas/02.webp" target="_blank"><img src="mapas/02.webp" loading="lazy"></a>
                <a href="mapas/03.webp" target="_blank"><img src="mapas/03.webp" loading="lazy"></a>
                <a href="mapas/04.webp" target="_blank"><img src="mapas/04.webp" loading="lazy"></a>
                <a href="mapas/05.webp" target="_blank"><img src="mapas/05.webp" loading="lazy"></a>
                <a href="mapas/06.webp" target="_blank"><img src="mapas/06.webp" loading="lazy"></a>
                <a href="mapas/07.webp" target="_blank"><img src="mapas/07.webp" loading="lazy"></a>
                <a href="mapas/08.webp" target="_blank"><img src="mapas/08.webp" loading="lazy"></a>
                <a href="mapas/09.webp" target="_blank"><img src="mapas/09.webp" loading="lazy"></a>
                <a href="mapas/10.webp" target="_blank"><img src="mapas/10.webp" loading="lazy"></a>
                <a href="mapas/11.webp" target="_blank"><img src="mapas/11.webp" loading="lazy"></a>
                <a href="mapas/12.webp" target="_blank"><img src="mapas/12.webp" loading="lazy"></a>
                <a href="mapas/13.webp" target="_blank"><img src="mapas/13.webp" loading="lazy"></a>
                <a href="mapas/14.webp" target="_blank"><img src="mapas/14.webp" loading="lazy"></a>
                <a href="mapas/15.webp" target="_blank"><img src="mapas/15.webp" loading="lazy"></a>
                <a href="mapas/acumulado-15-dias.webp" target="_blank"><img src="mapas/acumulado-15-dias.webp" loading="lazy"></a>

                <div id="lens"></div>
        </div>

        <script>
                if (window.matchMedia('(min-width: 801px)').matches) {

                        const images = document.querySelectorAll('#viewer img');
                        let index = 0;

                        const lens = document.getElementById('lens');

                        function showImage(i) {
                                images[index].classList.remove('active');
                                index = Math.max(0, Math.min(i, images.length - 1));
                                images[index].classList.add('active');
                        }

                        document.getElementById('prev').onclick = () => showImage(index - 1);
                        document.getElementById('next').onclick = () => showImage(index + 1);

                        document.addEventListener('keydown', e => {
                                if (e.key === 'ArrowLeft') showImage(index - 1);
                                if (e.key === 'ArrowRight') showImage(index + 1);
                        });

                        const zoom = 0.8;

                        images.forEach(img => {

                                img.addEventListener('mouseenter', () => {
                                        lens.style.display = 'block';
                                        lens.style.backgroundImage = `url(${img.src})`;
                                });

                                img.addEventListener('mouseleave', () => {
                                        lens.style.display = 'none';
                                });

                                img.addEventListener('mousemove', (e) => {
                                        const rect = img.getBoundingClientRect();

                                        const x = e.clientX - rect.left;
                                        const y = e.clientY - rect.top;

                                        const scaleX = img.naturalWidth / rect.width;
                                        const scaleY = img.naturalHeight / rect.height;

                                        lens.style.left = (e.clientX - lens.offsetWidth / 2) + 'px';
                                        lens.style.top = (e.clientY - lens.offsetHeight / 2) + 'px';

                                        lens.style.backgroundSize =
                                                (img.naturalWidth * zoom) + 'px ' +
                                                (img.naturalHeight * zoom) + 'px';

                                        lens.style.backgroundPosition =
                                                (-x * scaleX * zoom + lens.offsetWidth / 2) + 'px ' +
                                                (-y * scaleY * zoom + lens.offsetHeight / 2) + 'px';
                                });
                        });
                }
        </script>

</body>

</html>
