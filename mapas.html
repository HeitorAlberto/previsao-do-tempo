<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8" />
	<title>ECMWF - Visualizador Suavizado</title>
	<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
	<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
	<style>
		html,
		body {
			height: 100%;
			margin: 0;
			font-family: sans-serif;
		}

		#map {
			height: 100vh;
			width: 100%;
			background: #ffffff;
		}

		.controls {
			position: absolute;
			top: 20px;
			right: 20px;
			z-index: 1000;
			background: white;
			padding: 15px;
			border-radius: 8px;
			box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
			width: 200px;
		}

		.btn-grid {
			display: flex;
			flex-direction: column;
			gap: 5px;
			margin-top: 10px;
		}

		button {
			padding: 8px;
			cursor: pointer;
			border: 1px solid #ddd;
			background: #f8f9fa;
			border-radius: 4px;
			font-weight: bold;
			text-align: left;
		}

		button.active {
			background: #28a745;
			color: white;
			border-color: #1e7e34;
		}

		#status {
			font-size: 12px;
			margin-top: 8px;
			color: #555;
		}
	</style>
</head>

<body>

	<div class="controls">
		<strong>Previsão ECMWF 00h</strong>
		<div id="dayButtons" class="btn-grid"></div>
		<div id="status">Carregando mapa...</div>
	</div>

	<div id="map"></div>

	<script>
		// 1. Inicializa o mapa forçando o uso do Canvas para aguentar o grid denso
		const meuCanvas = L.canvas({ padding: 0.5 });
		const map = L.map('map', {
			preferCanvas: true
		}).setView([-15, -55], 4);

		// Sanduíche: Camada Base de Fundo (Sem cidades/nomes)
		L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png', {
			attribution: '&copy; CartoDB'
		}).addTo(map);

		let dataGlobal = null;
		const layerChuva = L.layerGroup().addTo(map);

		// 2. Sua Escala de Cores Personalizada
		function getColor(p) {
			return p >= 400 ? '#9370DB' :
				p >= 300 ? '#DDA0DD' :
					p >= 200 ? '#5D4037' :
						p >= 150 ? '#8D6E63' :
							p >= 100 ? '#a10e0e' :
								p >= 75 ? '#ff5959' :
									p >= 50 ? '#E65100' :
										p >= 40 ? '#FB8C00' :
											p >= 30 ? '#FDD835' :
												p >= 20 ? '#FFFF8D' :
													p >= 15 ? '#0D47A1' :
														p >= 10 ? '#4FC3F7' :
															p >= 6 ? '#1B5E20' :
																p >= 3 ? '#81C784' :
																	p >= 1 ? '#BDBDBD' : 'transparent';
		}

		// 3. Renderização Otimizada da Chuva Suavizada
		function carregarDia(index) {
			if (!dataGlobal) return;
			layerChuva.clearLayers();

			const { lat, lon } = dataGlobal.grid;
			const grid = dataGlobal.frames_24h[index].precip;

			// Variáveis temporárias para o tamanho do pixel suavizado (0.0625)
			const dLat = 0.0625;
			const dLon = 0.0625;

			for (let y = 0; y < lat.length; y++) {
				for (let x = 0; x < lon.length; x++) {
					const val = grid[y][x];

					// Desenha apenas o que for chuva real (>= 1mm)
					if (val >= 1) {
						// Cria os pequenos retângulos colados, gerando o efeito degradê
						L.rectangle([[lat[y], lon[x]], [lat[y] + dLat, lon[x] + dLon]], {
							renderer: meuCanvas, // Força renderizar no Canvas único
							fillColor: getColor(val),
							weight: 0,           // Sem bordas para não quebrar a suavização
							fillOpacity: 0.7,    // Opacidade perfeita para o fundo limpo
							interactive: false
						}).addTo(layerChuva);
					}
				}
			}
			document.getElementById('status').innerText = `Exibindo: ${dataGlobal.frames_24h[index].label}`;
		}

		// 4. Carrega os Dados Meteorológicos
		fetch("dados.json")
			.then(res => res.json())
			.then(data => {
				dataGlobal = data;
				const container = document.getElementById('dayButtons');

				data.frames_24h.forEach((frame, i) => {
					const btn = document.createElement('button');
					btn.innerText = frame.label;
					btn.onclick = (e) => {
						document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
						e.target.classList.add('active');
						carregarDia(i);
					};
					container.appendChild(btn);
					if (i === 0) btn.click();
				});
			})
			.catch(err => {
				document.getElementById('status').innerText = "Erro ao carregar dados.json";
				console.error(err);
			});

		// 5. Sanduíche: Fronteiras dos Estados (Por cima da chuva)
		fetch("https://raw.githubusercontent.com/codeforamerica/click_that_hood/master/public/data/brazil-states.geojson")
			.then(res => res.json())
			.then(geojsonData => {
				L.geoJSON(geojsonData, {
					style: {
						color: "#000000",
						weight: 2,
						fillColor: "transparent",
						fillOpacity: 0
					},
					interactive: false
				}).addTo(map);
			})
			.catch(err => console.error("Erro ao carregar bordas dos estados:", err));

		// 6. Sanduíche: Nomes das Cidades no TOPO absoluto
		L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_only_labels/{z}/{x}/{y}{r}.png', {
			zIndex: 1000,
			pane: 'markerPane',
			opacity: 0.9
		}).addTo(map);

		// 7. Legenda Dinâmica da sua Escala
		const legend = L.control({ position: 'bottomright' });
		legend.onAdd = function (map) {
			const div = L.DomUtil.create('div', 'info legend');
			const grades = [1, 3, 6, 10, 15, 20, 30, 40, 50, 75, 100, 150, 200, 300, 400];

			div.innerHTML = '<strong>Chuva (mm)</strong><br>';
			for (let i = 0; i < grades.length; i++) {
				div.innerHTML +=
					'<i style="background:' + getColor(grades[i]) + '; width: 14px; height: 14px; float: left; margin-right: 8px; opacity: 0.7; border: 1px solid #999;"></i> ' +
					grades[i] + (grades[i + 1] ? '&ndash;' + grades[i + 1] + '<br>' : '+');
			}
			div.style.background = 'white'; div.style.padding = '10px'; div.style.lineHeight = '22px';
			div.style.borderRadius = '5px'; div.style.boxShadow = '0 0 15px rgba(0,0,0,0.2)'; div.style.fontSize = '18px';
			return div;
		};
		legend.addTo(map);

	</script>
</body>

</html>
