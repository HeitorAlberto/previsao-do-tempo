<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8" />
	<title>ECMWF - Controle de Dias</title>
	<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
	<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
	<style>
		html,
		body {
			height: 100%;
			margin: 0;
			font-family: sans-serif;
		}

		#map {
			height: 100vh;
			width: 100%;
			background: #222;
		}

		.controls {
			position: absolute;
			top: 10px;
			right: 10px;
			z-index: 1000;
			background: rgba(255, 255, 255, 0.9);
			padding: 15px;
			border-radius: 8px;
			box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
			max-width: 250px;
		}

		.btn-grid {
			display: grid;
			grid-template-columns: repeat(3, 1fr);
			gap: 5px;
			margin-top: 10px;
		}

		button {
			padding: 8px;
			cursor: pointer;
			border: 1px solid #ccc;
			background: #fff;
			font-size: 12px;
			border-radius: 4px;
		}

		button.active {
			background: #007bff;
			color: #fff;
			border-color: #0056b3;
		}

		#status {
			font-size: 11px;
			color: #666;
			margin-top: 8px;
		}
	</style>
</head>

<body>

	<div class="controls">
		<strong>Previsão de Chuva</strong>
		<div id="dayButtons" class="btn-grid"></div>
		<div id="status">Aguardando...</div>
	</div>

	<div id="map"></div>

	<script>
		// Inicializa o mapa com Renderer Canvas para aguentar o volume de dados
		const map = L.map('map', {
			renderer: L.canvas(),
			preferCanvas: true
		}).setView([-15, -55], 4);

		L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

		let dataGlobal = null;
		const layerChuva = L.layerGroup().addTo(map);

		function getColor(p) {
			return p > 80 ? '#4B0082' :
				p > 50 ? '#0000FF' :
					p > 20 ? '#00BFFF' :
						p > 10 ? '#00FF00' :
							p > 2 ? '#FFFF00' : 'transparent';
		}

		function carregarDia(index) {
			if (!dataGlobal) return;
			layerChuva.clearLayers();

			const lats = dataGlobal.grid.lat;
			const lons = dataGlobal.grid.lon;
			const grid = dataGlobal.frames_24h[index].precip;

			// Loop otimizado
			for (let y = 0; y < lats.length - 1; y++) {
				for (let x = 0; x < lons.length - 1; x++) {
					const val = grid[y][x];

					if (val > 1) { // Só desenha onde tem chuva relevante
						const bounds = [
							[lats[y], lons[x]],
							[lats[y + 1], lons[x + 1]]
						];

						L.rectangle(bounds, {
							fillColor: getColor(val),
							weight: 0,
							fillOpacity: 0.6,
							interactive: false
						}).addTo(layerChuva);
					}
				}
			}
			document.getElementById('status').innerText = `Exibindo Frame: ${index + 1}`;
		}

		// Carregamento do JSON
		fetch("dados.json")
				.then(res => res.json())
				.then(data => {
					dataGlobal = data;
					const container = document.getElementById('dayButtons');
					container.innerHTML = '';

					data.frames_24h.forEach((frame, i) => {
						const btn = document.createElement('button');

						// Usa o texto "Data - Dia" vindo do Python
						btn.innerText = frame.label;

						// Estilo para caber o texto maior
						btn.style.width = "100%";
						btn.style.marginBottom = "5px";

						btn.onclick = (e) => {
							document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
							e.target.classList.add('active');
							carregarDia(i);
						};
						container.appendChild(btn);
						if (i === 0) btn.click();
					});
				});
	</script>
</body>

</html>
